name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wings2i-gracie'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wings2i-gracie'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      - run: npx eslint server/src client/src --ext .ts

  dep-direction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dependency direction
        run: |
          node -e "
          const pkg = require('./package.json');
          const deps = { ...pkg.dependencies, ...pkg.devDependencies };
          const allowed = ['@wings2i-gracie/contracts'];
          const violations = Object.keys(deps).filter(d =>
            d.startsWith('@wings2i-gracie/') && !allowed.includes(d));
          if (violations.length > 0) {
            console.error('Dependency direction violation in core:');
            violations.forEach(d => console.error('  ' + d));
            console.error('core may only depend on @wings2i-gracie/contracts.');
            process.exit(1);
          }
          console.log('dep-direction: OK');
          "

  prisma-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wings2i-gracie'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      - run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
